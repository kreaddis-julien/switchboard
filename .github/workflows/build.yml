name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # macOS only: this fork distributes unsigned macOS builds (the in-app
        # notifier links to the .dmg). Windows/Linux were dropped — the Windows
        # native rebuild (node-pty) was broken and no other platform is targeted.
        # Re-add entries here (see git history) if another platform is wanted.
        include:
          - os: macos-14
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install setuptools (node-gyp distutils fix)
        run: python -m pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Bundle CodeMirror
        run: npm run bundle:codemirror

      - name: Build
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.platform == 'mac' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.zip
            dist/*.zip.blockmap
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
          if-no-files-found: ignore

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Published (not draft): the in-app update notifier reads the fork's
          # latest PUBLISHED release via the GitHub API — a draft is invisible to it.
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME#v}" \
            --notes "Automated release for ${GITHUB_REF_NAME}." \
            dist/*
