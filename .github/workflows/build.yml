name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # macOS only: this fork distributes unsigned macOS builds (the in-app
        # notifier links to the .dmg). Windows/Linux were dropped — the Windows
        # native rebuild (node-pty) was broken and no other platform is targeted.
        # Re-add entries here (see git history) if another platform is wanted.
        include:
          - os: macos-14
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install setuptools (node-gyp distutils fix)
        run: python -m pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Bundle CodeMirror
        run: npm run bundle:codemirror

      - name: Build
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          # No Apple Developer ID for this fork -> build UNSIGNED. Disable identity
          # auto-discovery so electron-builder doesn't try to sign (passing an empty
          # CSC_LINK made it treat "" as a cert path and fail: "<root> not a file").
          # An afterPack hook then ad-hoc signs the app so it stays openable.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.zip
            dist/*.zip.blockmap
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
          if-no-files-found: ignore

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Published (not draft): the in-app update notifier reads the fork's
          # latest PUBLISHED release via the GitHub API — a draft is invisible to it.
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME#v}" \
            --notes "Automated release for ${GITHUB_REF_NAME}." \
            dist/*
