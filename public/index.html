        <button class="sidebar-tab" data-tab="plans" title="Plans" data-i18n-title="tab.plans"><svg width="18" height="18" viewBox="0 0 17 17" fill="currentColor" stroke="currentColor" stroke-width="0"><path d="M14 2v-2h-13v17h13v-2h2v-13h-2zM2 16v-15h2v15h-2zM13 16h-8v-15h8v15zM15 14h-1v-3h1v3zM15 10h-1v-3h1v3zM14 6v-3h1v3h-1zM6 4h5v1h-5v-1zM6 6h4v1h-4v-1z"/></svg></button>

        <button class="sidebar-tab" data-tab="teams" title="Agent Teams" data-i18n-title="tab.teams"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.5"/><circle cx="5" cy="18" r="2.5"/><circle cx="19" cy="18" r="2.5"/><path d="M12 7.5v4"/><path d="M10.5 13.5 6.8 16"/><path d="m13.5 13.5 3.7 2.5"/></svg></button>

      </div>
      <div id="session-filters">
        <button id="running-toggle" title="Show running only" data-i18n-title="filter.running"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="4"/></svg></button>
        <button id="star-toggle" title="Show pinned only" data-i18n-title="filter.pinned"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M9.828.722a.5.5 0 0 1 .354.146l4.95 4.95a.5.5 0 0 1-.707.707c-.28-.28-.576-.49-.888-.656L10.073 9.333l-.07 3.181a.5.5 0 0 1-.853.354l-3.535-3.536-4.243 4.243a.5.5 0 1 1-.707-.707l4.243-4.243L1.372 5.11a.5.5 0 0 1 .354-.854l3.18-.07L8.37.722A3.37 3.37 0 0 1 9.12.074a.5.5 0 0 1 .708.002l-.707.707z"/></svg></button>
        <button id="today-toggle" title="Show today's sessions only" data-i18n-title="filter.today"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-12a2 2 0 0 1-2-2v-12z"/><path d="M16 3v4"/><path d="M8 3v4"/><path d="M4 11h16"/><path d="M11 15h1"/><path d="M12 15v3"/></svg></button>
        <button id="archive-toggle" title="Show archived sessions" data-i18n-title="filter.archived"></button>
        <span id="loading-status" style="display:none;"></span>
        <button id="resort-btn" title="Re-sort sessions" data-i18n-title="filter.resort"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/></svg></button>
        <button id="refresh-cache-btn" title="Refresh sessions (rescan files, clear ghosts)" data-i18n-title="filter.refresh"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg></button>
        <button id="add-project-btn" title="Add project" data-i18n-title="filter.add_project"><svg width="14" height="14" viewBox="0 0 512 512" fill="currentColor" stroke="currentColor" stroke-width="0"><path d="M512 416c0 35.3-28.7 64-64 64L64 480c-35.3 0-64-28.7-64-64L0 96C0 60.7 28.7 32 64 32l128 0c20.1 0 39.1 9.5 51.2 25.6l19.2 25.6c6 8.1 15.5 12.8 25.6 12.8l160 0c35.3 0 64 28.7 64 64l0 256zM232 376c0 13.3 10.7 24 24 24s24-10.7 24-24l0-64 64 0c13.3 0 24-10.7 24-24s-10.7-24-24-24l-64 0 0-64c0-13.3-10.7-24-24-24s-24 10.7-24 24l0 64-64 0c-13.3 0-24 10.7-24 24s10.7 24 24 24l64 0 0 64z"/></svg></button>
      </div>
    </div>
    <div id="search-bar">
      <input id="search-input" type="text" placeholder="Search sessions..." data-i18n-placeholder="search.placeholder" />
      <button id="search-clear" type="button" aria-label="Clear search" data-i18n-aria="search.clear">&times;</button>
      <button id="search-titles-toggle" type="button" title="Search titles only" aria-label="Search titles only" data-i18n-title="search.titles_only" data-i18n-aria="search.titles_only">Tt</button>
    </div>
    <div id="sidebar-content"></div>
    <div id="plans-content" style="display:none;"></div>
    <div id="stats-content" style="display:none;">
      <div class="plans-empty" data-i18n="stats.hint">Click the Stats tab to view activity heatmap.</div>
    </div>
    <div id="memory-content" style="display:none;"></div>
    <div id="teams-content" style="display:none;"></div>
  </div>
  <div id="sidebar-resize-handle"></div>
  <div id="main">
    <div id="placeholder">
      <span class="ph-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2.5"/><path d="M9 3v18M3 9h6"/></svg></span>
      <div class="ph-title" data-i18n="placeholder.title">No session selected</div>
      <div class="ph-sub" data-i18n="placeholder.sub">Pick a session in the sidebar to open it.</div>
    </div>
    <div id="stats-viewer" style="display:none;">
      <div id="stats-viewer-header">
        <span id="stats-viewer-title" data-i18n="stats.title">Activity</span>
      </div>
      <div id="stats-viewer-body"></div>
    </div>
    <div id="memory-viewer" style="display:none;"></div>
    <div id="plan-viewer" style="display:none;"></div>
    <div id="settings-viewer" style="display:none;">
      <div id="settings-viewer-header">
        <span id="settings-viewer-title" data-i18n="settings.title">Settings</span>
      </div>
      <div id="settings-viewer-body"></div>
    </div>
    <div id="jsonl-viewer" style="display:none;">
      <div id="jsonl-viewer-header">
        <span id="jsonl-viewer-title" data-i18n="jsonl.title">Message History</span>
        <span id="jsonl-viewer-session-id"></span>
      </div>
      <div id="jsonl-viewer-body"></div>
    </div>
    <div id="orch-viewer" style="display:none;">
      <div id="orch-viewer-header"></div>
      <div id="orch-viewer-body"></div>
    </div>
    <div id="terminal-area">
      <div id="terminal-header" style="display:none;">
        <div id="terminal-header-info">
          <span id="terminal-header-name"></span>
          <span id="terminal-header-pty-title" style="display:none;"></span>
          <span id="terminal-header-id"></span>
          <span id="terminal-header-shell" style="display:none;"></span>
        </div>
        <div id="terminal-header-controls">
          <span id="terminal-header-status"></span>
          <button id="terminal-stop-btn" title="Stop process" data-i18n-title="terminal.stop"><svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="2" y="2" width="8" height="8" rx="1"/></svg></button>
        </div>
      </div>
      <div id="grid-viewer" style="display:none;">
        <div id="grid-viewer-header">
          <span id="grid-viewer-title" data-i18n="grid.title">Session Overview</span>
          <span id="grid-viewer-count"></span>
        </div>
      </div>
      <div id="terminals"></div>
    </div>
  </div>
  </div><!-- /app-container -->
  <div id="update-toast" class="hidden">
    <span id="update-toast-msg" data-i18n="update.ready">Update ready — restart to apply</span>
    <button id="update-restart-btn" data-i18n="update.restart">Restart</button>
    <button id="update-dismiss-btn" data-i18n="update.later">Later</button>
  </div>
  <div id="status-bar"><span id="status-bar-info"></span><span id="status-bar-activity"></span><span id="status-bar-updater"></span></div>
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="../node_modules/@xterm/addon-search/lib/addon-search.js"></script>
  <script src="../node_modules/@xterm/addon-unicode-graphemes/lib/addon-unicode-graphemes.js"></script>
  <script src="../node_modules/@xterm/addon-webgl/lib/addon-webgl.js"></script>
  <script src="../node_modules/morphdom/dist/morphdom-umd.js"></script>
  <script src="../node_modules/dompurify/dist/purify.min.js"></script>
  <!-- codemirror-bundle.js (1.66 MB) is loaded lazily on first viewer/diff open
       via loadCodeMirrorBundle() in viewer-panel.js — keeps it off cold-start. -->
  <!-- i18n.js loads first so the global t() is available to every renderer script. -->
  <script src="i18n.js"></script>
  <script src="icons.js"></script>
  <script src="viewer-toolbar.js"></script>
  <script src="viewer-panel.js"></script>
  <script src="file-panel.js"></script>
  <script src="settings-panel.js"></script>
  <script src="utils.js"></script>
  <!-- shortcuts.js defines matchShortcut/isSessionNavShortcut/normalizeShortcuts used by
       terminal-manager, grid-view, app and settings-panel — must load before them. -->
  <script src="shortcuts.js"></script>
  <script src="terminal-themes.js"></script>
  <script src="terminal-manager.js"></script>
  <script src="grid-view.js"></script>
  <script src="stats-view.js"></script>
  <script src="jsonl-viewer.js"></script>
  <script src="dialogs.js"></script>
  <!-- session-health.js exposes getSessionHealth() used by sidebar.js for the health badge. -->
  <script src="session-health.js"></script>
  <script src="sidebar.js"></script>
  <script src="plans-memory-view.js"></script>
  <script src="orchestration-view.js"></script>
  <script src="app.js"></script>
  <script src="command-palette.js"></script>
  <script src="bookmarks-tags.js"></script>
</body>
</html>
